<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Combat System - Ultimate Performance AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-container">
    <div class="app-layout">
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="viewTitle">COMBAT SYSTEM</h1>
                <p class="subtitle" id="currentDateDisplay">--</p>
                <div id="daysLeftText" class="days-left-badge">-- DAYS LEFT</div>
            </header>

            <div class="tab-contents">
                <!-- Dashboard -->
                <section id="tab-dashboard" class="tab-pane active">
                    <div class="dash-main">
                        <div class="glass-panel text-center">
                            <div class="circle-score" id="winProbScore">--</div>
                        </div>
                        
                        <div class="glass-panel bg-caution text-center">
                            <h3 class="subtitle">行動ステータス</h3>
                            <div class="big-text" id="todayStateText">--</div>
                        </div>

                        <div class="glass-panel">
                            <div class="ultimate-command" id="dashCommand">未算出</div>
                        </div>

                        <div class="glass-panel">
                            <h3 class="subtitle">勝つための最優先行動</h3>
                            <ul id="dashActions" class="action-list"><li>データ不足</li></ul>
                        </div>

                        <div class="glass-panel bg-blue-dim">
                            <h3 class="subtitle">未来予測</h3>
                            <p id="futurePrediction" class="advice-card">データを入力して予測を確認</p>
                        </div>

                        <div class="glass-panel">
                            <h3 class="subtitle">栄養概況</h3>
                            <div id="dashNutritionSummary" class="nutri-summary-grid"></div>
                        </div>

                        <div class="glass-panel">
                            <canvas id="trendChart" height="150"></canvas>
                        </div>
                    </div>
                </section>

                <!-- Input Tab (Morning focus) -->
                <section id="tab-morning" class="tab-pane">
                    <div class="glass-panel">
                        <h2 class="mb-2">朝の戦場報告</h2>
                        <form id="formMorning">
                            <div class="input-group">
                                <label>体重 (kg)</label>
                                <input type="number" name="m_weight" step="0.1" required>
                            </div>
                            <div class="input-group">
                                <label>睡眠時間: <span id="v_sleep">8</span>h</label>
                                <input type="range" name="m_sleep_time" min="0" max="12" step="0.5" value="8" oninput="document.getElementById('v_sleep').innerText=this.value">
                            </div>
                            <div class="input-group">
                                <label>睡眠の質 (0-100): <span id="v_sq">80</span></label>
                                <input type="range" name="m_sleep_qual" min="0" max="100" value="80" oninput="document.getElementById('v_sq').innerText=this.value">
                            </div>
                            <div class="input-group">
                                <label>起床疲労 (0-100): <span id="v_mf">20</span></label>
                                <input type="range" name="m_fatigue" min="0" max="100" value="20" oninput="document.getElementById('v_mf').innerText=this.value">
                            </div>
                            <div class="input-group">
                                <label>筋の張り (0-100): <span id="v_mm">20</span></label>
                                <input type="range" name="m_muscle" min="0" max="100" value="20" oninput="document.getElementById('v_mm').innerText=this.value">
                            </div>
                            <button type="submit" class="cyber-button">報告して次へ</button>
                        </form>
                    </div>
                </section>

                <!-- Meal Tab (New) -->
                <section id="tab-meal" class="tab-pane">
                    <div class="glass-panel">
                        <h2 class="mb-2">食事管理</h2>
                        <div class="meal-score-box text-center mb-2">
                            <span class="subtitle">食事スコア</span>
                            <div class="big-text" id="mealTotalScore">0</div>
                        </div>

                        <div id="mealAdviceList"></div>

                        <form onsubmit="addDetailedMeal(event)" class="mt-2">
                            <div class="input-group">
                                <label>内容 / テンプレ</label>
                                <input type="text" name="meal_type" list="meal-presets" placeholder="例: 鶏むね・白米セット">
                                <datalist id="meal-presets">
                                    <option value="鶏むね・白米セット">
                                    <option value="鮭・オートミール">
                                    <option value="牛モモ・サラダ">
                                </datalist>
                            </div>
                            <div class="vision-upload mb-2">
                                <button type="button" class="sec-button" onclick="mockAnalyze('meal')"><i data-lucide="camera"></i> 写真から自動解析</button>
                            </div>
                            <div class="nutri-input-grid">
                                <div class="input-group"><label>P (g)</label><input type="number" name="meal_p" value="25"></div>
                                <div class="input-group"><label>C (g)</label><input type="number" name="meal_c" value="40"></div>
                                <div class="input-group"><label>F (g)</label><input type="number" name="meal_f" value="10"></div>
                            </div>
                            <div class="input-group"><label>水分 (ml)</label><input type="number" name="meal_water" value="500"></div>
                            <button type="submit" class="cyber-button">食事を記録</button>
                        </form>

                        <div id="mealLogList" class="mt-2"></div>
                    </div>
                </section>

                <!-- Analysis/History Tab -->
                <section id="tab-analysis" class="tab-pane">
                    <div class="glass-panel">
                        <h2 class="mb-2">分析・予測</h2>
                        <div id="learningInsight" class="advice-card">AI学習中...</div>
                        
                        <h3 class="subtitle mt-2">コンディション詳細入力</h3>
                        <form id="formPractice" class="mt-2">
                            <div class="input-group">
                                <label>練習強度 RPE (0-100): <span id="v_ri">80</span></label>
                                <input type="range" name="p_intensity" min="0" max="100" value="80" oninput="document.getElementById('v_ri').innerText=this.value">
                            </div>
                            <div class="input-group">
                                <label>反応速度 (0-100): <span id="v_rr">80</span></label>
                                <input type="range" name="p_react" min="0" max="100" value="80" oninput="document.getElementById('v_rr').innerText=this.value">
                            </div>
                            <button type="submit" class="cyber-button">練習結果を記録</button>
                        </form>

                        <form id="formNight" class="mt-2">
                            <div class="input-group"><label>夜の体重 (kg)</label><input type="number" name="n_weight" step="0.1"></div>
                            <div class="input-group"><label>闘争心 (0-100): <span id="v_nm">80</span></label><input type="range" name="n_mental" min="0" max="100" value="80" oninput="document.getElementById('v_nm').innerText=this.value"></div>
                            <button type="submit" class="cyber-button">本日を終了</button>
                        </form>

                        <button id="resetDataBtn" class="sec-button mt-2" style="color:var(--accent-red); border-color:var(--accent-red)">データ全消去</button>
                    </div>
                </section>

                <!-- Peak/Matchday Tab -->
                <section id="tab-peak" class="tab-pane">
                    <div class="glass-panel bg-red-dark">
                        <h2 class="mb-2">PEAKING MODE</h2>
                        <div id="peakingContent"></div>
                        <h3 class="subtitle mt-2">計量プロトコル</h3>
                        <p>試合3日前：水分ローディング開始（6L/day）</p>
                    </div>
                </section>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div data-tab="dashboard" class="nav-item active">
                <i data-lucide="home"></i>
                <span>ホーム</span>
            </div>
            <div data-tab="morning" class="nav-item">
                <i data-lucide="activity"></i>
                <span>入力</span>
            </div>
            <div data-tab="meal" class="nav-item">
                <i data-lucide="utensils"></i>
                <span>食事</span>
            </div>
            <div data-tab="analysis" class="nav-item">
                <i data-lucide="bar-chart-2"></i>
                <span>分析</span>
            </div>
            <div data-tab="peak" class="nav-item">
                <i data-lucide="target"></i>
                <span>ピーク</span>
            </div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
